<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Error — {{ app_name }}</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: #1e293b;
            border: 1px solid #7f1d1d;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #f87171;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        pre {
            color: #94a3b8;
            font-size: 0.8125rem;
            text-align: left;
            background: #0f172a;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid #334155;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">⛔</div>
        <h1>Authorization Error</h1>
        <pre>{{ message }}</pre>
        <div class="footer">{{ app_name }} · Identity &amp; Access Management</div>
    </div>
</body>

</html>
