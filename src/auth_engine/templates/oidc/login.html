<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — {{ app_name }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 14px;
            margin-bottom: 1rem;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }
        .client-badge {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .client-badge span {
            display: inline-block;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 0.3rem 0.9rem;
            font-size: 0.75rem;
            color: #94a3b8;
            font-family: monospace;
        }
        .client-badge .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 0.4rem;
            vertical-align: middle;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.4rem;
            letter-spacing: 0.02em;
        }
        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 0.7rem 0.875rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        button[type="submit"] {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
            letter-spacing: 0.01em;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.99); }
        .error {
            background: rgba(185, 28, 28, 0.15);
            border: 1px solid #b91c1c;
            color: #fca5a5;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .error::before { content: "⚠"; font-size: 1rem; }
        .divider {
            border: none;
            border-top: 1px solid #334155;
            margin: 1.5rem 0;
        }
        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #475569;
            line-height: 1.6;
        }
        .footer a { color: #0ea5e9; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .scope-pills {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .pill {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: #38bdf8;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg width="26" height="26" fill="white" viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                </svg>
            </div>
            <h1>Sign in to continue</h1>
            <p class="subtitle">via {{ app_name }}</p>
        </div>

        <div class="client-badge">
            <span><span class="dot"></span>{{ client_id or "unknown" }}</span>
        </div>

        {% if scopes %}
        <div class="scope-pills">
            {% for scope in scopes %}
            <span class="pill">{{ scope }}</span>
            {% endfor %}
        </div>
        {% endif %}

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ authorize_url }}">
            <input type="hidden" name="client_id" value="{{ client_id }}">
            <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
            <input type="hidden" name="scope" value="{{ scope }}">
            <input type="hidden" name="state" value="{{ state }}">
            <input type="hidden" name="nonce" value="{{ nonce }}">
            <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
            <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}">

            <label for="email">Email address</label>
            <div class="input-wrap">
                <input type="email" id="email" name="email" placeholder="you@example.com"
                       required autocomplete="email" autofocus>
            </div>

            <label for="password">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" name="password" placeholder="••••••••"
                       required autocomplete="current-password">
            </div>

            <button type="submit">Continue →</button>
        </form>

        <hr class="divider">
        <div class="footer">
            Securely authenticated by <a href="#">{{ app_name }}</a><br>
            Identity &amp; Access Management
        </div>
    </div>
</body>
</html>
